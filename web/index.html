<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Robot Arm Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }
#canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
canvas { display: block; }

#panel {
  position: absolute; top: 20px; left: 20px; z-index: 10;
  background: rgba(22, 33, 62, 0.92); border-radius: 12px;
  padding: 20px; width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  max-height: calc(100vh - 40px); overflow-y: auto;
}
#panel h2 { font-size: 18px; margin-bottom: 15px; color: #00d2ff;
  border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

.joint-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: stretch; }
.joint-left { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
.joint-right { width: 128px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
.joint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.joint-name { font-weight: bold; font-size: 14px; color: #00d2ff; }
.joint-values { font-size: 12px; color: #aaa; }
.joint-values .current { color: #888; }
.joint-values .target { color: #ffd700; font-weight: bold; }
.joint-btns { display: flex; gap: 4px; }
.torque-row { margin-top: 5px; display: flex; align-items: center; gap: 6px; }
.torque-bar-wrap { flex: 1; height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; }
.torque-bar-fill { height: 100%; width: 0%; border-radius: 4px; transition: width 0.2s, background 0.2s; }
.torque-info { font-size: 11px; color: #aaa; white-space: nowrap; min-width: 90px; text-align: right; }
.btn-en, .btn-zero {
  flex: 1; padding: 4px 0; border: none; border-radius: 5px;
  font-size: 11px; font-weight: bold; cursor: pointer;
  transition: background 0.2s, color 0.2s; white-space: nowrap; text-align: center;
}
.btn-en.on  { background: #06d6a0; color: #111; }
.btn-en.off { background: #444; color: #888; }
.btn-zero   { background: #ff9500; color: #111; }
.btn-zero:hover { background: #ffb340; }
.angle-input {
  width: 100%; padding: 4px 6px; border-radius: 5px; border: 1px solid #3a3a5a;
  background: #2a2a4a; color: #ffd700; font-size: 13px; font-weight: bold;
  text-align: center; outline: none; box-sizing: border-box;
}
.angle-input:focus { border-color: #00d2ff; }

input[type=range] {
  width: 100%; height: 6px; -webkit-appearance: none; appearance: none;
  background: #2a2a4a; border-radius: 3px; outline: none; margin-top: 6px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: #00d2ff; cursor: pointer;
}

.btn-row { display: flex; gap: 8px; margin-top: 18px; }
.btn {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: bold; cursor: pointer;
  transition: transform 0.1s, opacity 0.2s;
}
.btn:hover { transform: scale(1.03); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-read { background: #3a86ff; color: #fff; }
.btn-exec { background: #06d6a0; color: #111; }
.btn-stop { background: #ef476f; color: #fff; }
.btn-enable { background: #ffd166; color: #111; }
.btn-home { background: #9b5de5; color: #fff; }

#status { margin-top: 12px; font-size: 12px; color: #aaa; min-height: 18px; }
#progress-bar { margin-top: 8px; height: 4px; background: #2a2a4a; border-radius: 2px; overflow: hidden; }
#progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #06d6a0); transition: width 0.1s; }

#log-panel {
  margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 10px;
}
#log-panel h3 { font-size: 12px; color: #00d2ff; margin-bottom: 6px; letter-spacing: 0.5px; }
#log-box {
  height: 120px; overflow-y: auto; background: #0d0d1a;
  border-radius: 6px; padding: 6px 8px;
  font-size: 11px; font-family: 'Consolas', monospace;
  display: flex; flex-direction: column-reverse;
}
.log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
.log-line .ts { color: #555; margin-right: 6px; }
.log-line.info  .msg { color: #aaa; }
.log-line.ok    .msg { color: #06d6a0; }
.log-line.warn  .msg { color: #ffd166; }
.log-line.err   .msg { color: #ef476f; }
.log-line.move  .msg { color: #00d2ff; }

#info { position: absolute; bottom: 20px; left: 20px; z-index: 10; font-size: 11px; color: #555; }

#teach-panel { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
#teach-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
.btn-teach-start { background: #06d6a0; color: #111; }
.btn-teach-stop  { background: #ef476f; color: #fff; }
.teach-rec-status { font-size: 12px; color: #ef476f; margin: 6px 0 4px; min-height: 16px; }
.teach-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.teach-row { display: flex; gap: 6px; align-items: center; }
.btn-teach-play { flex: 1; padding: 6px 8px; background: #3a86ff; color: #fff; border: none;
  border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: left; }
.btn-teach-play:hover { background: #5a9eff; }
.teach-card { background: #243048; border: 1px solid #3a5070; border-radius: 8px;
  padding: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.teach-name-input { width: 100%; background: #2a2a4a; border: 1px solid #3a3a5a; border-radius: 5px;
  color: #ffd700; font-size: 12px; font-weight: bold; padding: 5px 6px; text-align: center;
  outline: none; cursor: pointer; box-sizing: border-box; }
.teach-name-input:focus { border-color: #00d2ff; cursor: text; }
.teach-meta { display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #e0e0e0; background: #2a2a4a; border: 1px solid #3a3a5a;
  border-radius: 5px; padding: 5px 6px; }
.btn-teach-play { width: 100%; padding: 6px 0; background: #06d6a0; color: #111; border: none;
  border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; }
.btn-teach-play:hover { background: #08f0b4; }
.btn-teach-del  { width: 100%; padding: 6px 0; background: #ef476f; color: #fff;
  border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
.btn-teach-del:hover { background: #ff6080; }
.teach-play-progress { margin-top: 8px; display: none; }
.teach-play-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
.teach-play-label span { color: #00d2ff; font-weight: bold; }
.teach-play-bar { height: 6px; background: #2a2a4a; border-radius: 3px; overflow: hidden; }
.teach-play-fill { height: 100%; width: 0%; border-radius: 3px; transition: width 0.3s;
  background: linear-gradient(90deg, #3a86ff, #06d6a0); }

#ik-panel { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
#ik-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
.ik-xyz { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.ik-xyz-field { display: flex; flex-direction: column; gap: 3px; }
.ik-xyz-field label { font-size: 11px; color: #aaa; }
.ik-xyz-field input { background: #1a2a3a; border: 1px solid #3a5070; border-radius: 5px;
  color: #00d2ff; font-size: 13px; font-weight: bold; padding: 5px 6px;
  text-align: center; outline: none; width: 100%; box-sizing: border-box; }
.ik-xyz-field input:focus { border-color: #00d2ff; }
.ik-orient { display: flex; gap: 6px; margin-bottom: 8px; }
.ik-orient-btn { flex: 1; padding: 6px 0; border: 1px solid #3a5070; border-radius: 6px;
  background: #1a2a3a; color: #aaa; font-size: 12px; cursor: pointer; text-align: center; }
.ik-orient-btn.active { background: #1a3a5a; border-color: #00d2ff; color: #00d2ff; font-weight: bold; }
.btn-ik-preview { background: #f77f00; color: #fff; width: 100%; margin-bottom: 8px; }
.btn-ik-preview:hover { background: #ff9a2e; }
.btn-ik-exec { background: #06d6a0; color: #111; width: 100%; }
.btn-ik-exec:hover { background: #08f0b4; }
#ik-result { display: none; background: #1a2a3a; border: 1px solid #3a5070;
  border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 12px; }
.ik-res-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.ik-res-label { color: #aaa; }
.ik-res-val { color: #00d2ff; font-family: monospace; }
.ik-res-err { color: #ffd166; font-weight: bold; }
#ik-error { display: none; color: #ef476f; font-size: 12px; margin-bottom: 6px; }
#ee-panel { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
#ee-panel h3 { font-size: 13px; color: #aaa; margin-bottom: 8px; }
.btn-ee { background: #f77f00; color: #fff; }
.btn-ee:hover { background: #ff9a2e; }
#ee-display { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
.ee-row { display: flex; justify-content: space-between; align-items: center;
  background: #1a2a3a; border-radius: 5px; padding: 4px 8px; font-size: 12px; }
.ee-label { color: #aaa; width: 36px; }
.ee-val { color: #00d2ff; font-weight: bold; font-family: monospace; flex: 1; text-align: right; }
.ee-unit { color: #666; margin-left: 4px; width: 20px; }
.btn-gripper-open  { background: #06d6a0; color: #111; flex: 1; }
.btn-gripper-open:hover  { background: #05c490; }
.btn-gripper-close { background: #f4845f; color: #fff; flex: 1; }
.btn-gripper-close:hover { background: #e0714d; }
/* ── Pick & Place Sequence ── */
.seq-section { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; }
.seq-section h3 { font-size: 13px; color: #00d2ff; margin: 0 0 10px; }
.seq-pos-block { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
.seq-pos-label { font-size: 11px; color: #aaa; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.seq-pos-label span { font-weight: bold; color: #ffd700; }
.seq-xyz { display: flex; gap: 4px; margin-bottom: 5px; align-items: center; }
.seq-xyz input { flex: 1; min-width: 0; background: #1a2a4a; border: 1px solid #334; color: #fff; border-radius: 4px; padding: 3px 5px; font-size: 12px; text-align: center; }
.seq-xyz label { font-size: 11px; color: #666; width: 12px; text-align: center; }
.seq-xyz span { font-size: 11px; color: #666; }
.seq-pos-row2 { display: flex; gap: 5px; align-items: center; }
.seq-pos-row2 select { flex: 1; background: #1a2a4a; border: 1px solid #334; color: #fff; border-radius: 4px; padding: 3px 5px; font-size: 11px; }
.btn-seq-record { background: #2a3a6a; color: #aaa; border: none; border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.btn-seq-record:hover { background: #3a4a8a; color: #fff; }
.seq-param { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 12px; color: #aaa; }
.seq-param input { width: 60px; background: #1a2a4a; border: 1px solid #334; color: #fff; border-radius: 4px; padding: 3px 5px; font-size: 12px; text-align: center; }
.btn-seq-preview { background: #7b61ff; color: #fff; flex: 1; }
.btn-seq-preview:hover { background: #6a50ee; }
.btn-seq-run { background: #06d6a0; color: #111; flex: 1; }
.btn-seq-run:hover { background: #05c490; }
.btn-seq-stop { background: #e63946; color: #fff; flex: 1; }
.btn-seq-stop:hover { background: #c1121f; }
.seq-preview-result { font-size: 11px; margin: 6px 0; line-height: 1.7; }
.seq-preview-ok  { color: #06d6a0; }
.seq-preview-err { color: #e63946; }
.seq-progress-wrap { margin-top: 6px; }
.seq-step-bar { height: 6px; background: #2a2a4a; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.seq-step-fill { height: 100%; border-radius: 3px; background: #06d6a0; transition: width 0.4s; }
.seq-status-text { font-size: 11px; color: #aaa; }
.seq-status-text.err { color: #e63946; }
.seq-status-text.ok  { color: #06d6a0; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel">
  <h2>Robot Arm Control</h2>
  <div id="joints"></div>
  <div class="btn-row">
    <button class="btn btn-gripper-open"  onclick="gripperOpen()">夹爪张开</button>
    <button class="btn btn-gripper-close" onclick="gripperGrasp()">夹取物体</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-read" onclick="readCurrent()">读取位置</button>
    <button class="btn btn-exec" id="btn-exec" onclick="executeMove()">执行运动</button>
    <button class="btn btn-stop" onclick="emergencyStop()">紧急停止</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-enable" onclick="reEnable()">全部上使能</button>
    <button class="btn btn-home" onclick="goHome()">安全归位</button>
  </div>
  <div id="status">Loading 3D model...</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="log-panel">
    <h3>&#9654; 运动日志</h3>
    <div id="log-box"></div>
  </div>
  <div id="ee-panel">
    <h3>&#128205; 末端位置 (FK)</h3>
    <button class="btn btn-ee" onclick="readEEPose()">读取末端位置</button>
    <div id="ee-display">
      <div class="ee-row"><span class="ee-label">X</span><span class="ee-val" id="ee-x">--</span><span class="ee-unit">mm</span></div>
      <div class="ee-row"><span class="ee-label">Roll</span><span class="ee-val" id="ee-roll">--</span><span class="ee-unit">deg</span></div>
      <div class="ee-row"><span class="ee-label">Y</span><span class="ee-val" id="ee-y">--</span><span class="ee-unit">mm</span></div>
      <div class="ee-row"><span class="ee-label">Pitch</span><span class="ee-val" id="ee-pitch">--</span><span class="ee-unit">deg</span></div>
      <div class="ee-row"><span class="ee-label">Z</span><span class="ee-val" id="ee-z">--</span><span class="ee-unit">mm</span></div>
      <div class="ee-row"><span class="ee-label">Yaw</span><span class="ee-val" id="ee-yaw">--</span><span class="ee-unit">deg</span></div>
    </div>
  </div>

  <div id="ik-panel">
    <h3>&#127919; 目标位置运动 (IK)</h3>
    <div class="ik-xyz">
      <div class="ik-xyz-field"><label>X (mm)</label><input type="number" id="ik-x" value="300" step="1"></div>
      <div class="ik-xyz-field"><label>Y (mm)</label><input type="number" id="ik-y" value="0"   step="1"></div>
      <div class="ik-xyz-field"><label>Z (mm)</label><input type="number" id="ik-z" value="200" step="1"></div>
    </div>
    <div class="ik-orient">
      <div class="ik-orient-btn active" id="orient-horizontal" onclick="setOrient('horizontal')">水平取物</div>
      <div class="ik-orient-btn"        id="orient-vertical"   onclick="setOrient('vertical')">竖直向下</div>
    </div>
    <button class="btn btn-ik-preview" onclick="ikPreview()">预览</button>
    <div id="ik-error"></div>
    <div id="ik-result">
      <div class="ik-res-row"><span class="ik-res-label">到达位置</span><span class="ik-res-val" id="ik-res-xyz">--</span></div>
      <div class="ik-res-row"><span class="ik-res-label">位置误差</span><span class="ik-res-err" id="ik-res-err">--</span></div>
      <div class="ik-res-row"><span class="ik-res-label">J1~J6 (°)</span><span class="ik-res-val" id="ik-res-joints">--</span></div>
      <button class="btn btn-ik-exec" onclick="ikExecute()">确认执行</button>
    </div>
  </div>

  <!-- ── Pick & Place Sequence ─────────────────────────────── -->
  <div class="seq-section">
    <h3>📦 抓取放置序列</h3>

    <!-- Pick position -->
    <div class="seq-pos-block">
      <div class="seq-pos-label"><span>抓取位</span>
        <button class="btn-seq-record" onclick="seqRecordPick()">记录当前末端</button>
      </div>
      <div class="seq-xyz">
        <label>X</label><input type="number" id="seq-pick-x" placeholder="mm" step="1">
        <label>Y</label><input type="number" id="seq-pick-y" placeholder="mm" step="1">
        <label>Z</label><input type="number" id="seq-pick-z" placeholder="mm" step="1">
        <span>mm</span>
      </div>
      <div class="seq-pos-row2">
        <select id="seq-pick-orient">
          <option value="horizontal">水平抓取</option>
          <option value="vertical">竖直向下</option>
        </select>
      </div>
    </div>

    <!-- Place position -->
    <div class="seq-pos-block">
      <div class="seq-pos-label"><span>放置位</span>
        <button class="btn-seq-record" onclick="seqRecordPlace()">记录当前末端</button>
      </div>
      <div class="seq-xyz">
        <label>X</label><input type="number" id="seq-place-x" placeholder="mm" step="1">
        <label>Y</label><input type="number" id="seq-place-y" placeholder="mm" step="1">
        <label>Z</label><input type="number" id="seq-place-z" placeholder="mm" step="1">
        <span>mm</span>
      </div>
      <div class="seq-pos-row2">
        <select id="seq-place-orient">
          <option value="horizontal">水平放置</option>
          <option value="vertical">竖直向下</option>
        </select>
      </div>
    </div>

    <!-- Approach distance -->
    <div class="seq-param">
      <span>接近距离</span>
      <input type="number" id="seq-approach-dist" value="100" min="20" max="300" step="10">
      <span>mm（夹爪后退距离）</span>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-seq-preview" onclick="seqPreview()">预览路径</button>
      <button class="btn btn-seq-run" id="btn-seq-run" onclick="seqRun()" disabled>执行序列</button>
      <button class="btn btn-seq-stop" onclick="seqStop()">中止</button>
    </div>

    <!-- Preview result -->
    <div class="seq-preview-result" id="seq-preview-result"></div>

    <!-- Progress -->
    <div class="seq-progress-wrap" id="seq-progress-wrap" style="display:none">
      <div class="seq-step-bar"><div class="seq-step-fill" id="seq-step-fill" style="width:0%"></div></div>
      <div class="seq-status-text" id="seq-status-text">待机</div>
    </div>
  </div>

  <div id="teach-panel">
    <h3>&#127939; 拖动示教</h3>
    <div class="btn-row">
      <button class="btn btn-teach-start" id="btn-teach-start" onclick="teachStart()">开始示教</button>
      <button class="btn btn-teach-stop"  id="btn-teach-stop"  onclick="teachStop()" disabled>结束示教</button>
    </div>
    <div class="teach-rec-status" id="teach-rec-status"></div>
    <div class="teach-play-progress" id="teach-play-progress">
      <div class="teach-play-label" id="teach-play-label">准备中...</div>
      <div class="teach-play-bar"><div class="teach-play-fill" id="teach-play-fill"></div></div>
    </div>
    <div class="teach-list" id="teach-list"></div>
  </div>
</div>

<div id="info">Left drag: rotate | Right drag: pan | Scroll: zoom</div>

<!-- Three.js r134 — last version with examples/js/ global scripts -->
<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/loaders/STLLoader.js"></script>

<script>
// ── Config ──────────────────────────────────────────────────────
const JOINT_NAMES = ['1','2','3','4','5','6','7'];
const JOINT_LABELS = ['J1 Base','J2 Shoulder','J3 Elbow','J4 Wrist1','J5 Wrist2','J6 Wrist3','J7 Gripper'];
const JOINT_SLIDER_LIMITS = { '7': [0, 90] };  // Gripper: 0°=closed, 90°=fully open

// URDF joint definitions (from arm.urdf)
// Each: { origin: {xyz, rpy}, axis: [x,y,z], parent, child }
const URDF_JOINTS = [
  { name:'1', xyz:[0,0,0.1281],     rpy:[0,0,0],                       axis:[0,0,1] },
  { name:'2', xyz:[0,0,0],          rpy:[-1.5708,0,3.1397],            axis:[0,0,1] },
  { name:'3', xyz:[0.37425,0,0],    rpy:[0,0,-2.8166],                 axis:[0,0,1] },
  { name:'4', xyz:[0.30395,0.00033,0], rpy:[0,0,-0.3307],              axis:[0,0,1] },
  { name:'5', xyz:[0.080376,0.0018,-0.002], rpy:[-1.5708,-1.5689,0.0057], axis:[0,0,1] },
  { name:'6', xyz:[0.002092,0.02993,0], rpy:[-1.5708,0,-0.0019],       axis:[0,0,1] },
];

const STL_FILES = ['0.STL','1.STL','2.STL','3.STL','4.STL','5.STL','6.STL'];
const STL_COLORS = [0x6677aa, 0x7788bb, 0x8899cc, 0x7788bb, 0x8899cc, 0x7788bb, 0xeeeeee];

// ── Three.js Scene ──────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.01, 10);
camera.position.set(0.8, 0.6, 0.8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);  // r134 global
controls.target.set(0, 0.3, 0);
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2, 3, 2);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0xaaccff, 0.3).translateX(-1).translateY(2));

// Grid
scene.add(new THREE.GridHelper(2, 20, 0x333355, 0x222244));

// ── Build kinematic chain ───────────────────────────────────────
// We create a hierarchy of THREE.Group objects:
//   baseGroup (link0 mesh)
//     -> joint1Group (rotates around axis)
//       -> link1Offset (origin transform + link1 mesh)
//         -> joint2Group ...

const jointGroups = [];  // groups that rotate for each joint
const linkMeshes = [];   // loaded STL meshes

// Root group (flips Z-up to Y-up)
const rootGroup = new THREE.Group();
rootGroup.rotation.x = -Math.PI / 2;
scene.add(rootGroup);

// Link 0 (base) - no joint, just mesh
const link0Group = new THREE.Group();
rootGroup.add(link0Group);

// Build joint chain
let parentGroup = link0Group;
for (let i = 0; i < URDF_JOINTS.length; i++) {
  const j = URDF_JOINTS[i];

  // Origin offset group (translation + fixed rotation from URDF)
  const originGroup = new THREE.Group();
  originGroup.position.set(j.xyz[0], j.xyz[1], j.xyz[2]);

  // Apply RPY rotation (roll-pitch-yaw = XYZ intrinsic = ZYX extrinsic)
  const euler = new THREE.Euler(j.rpy[0], j.rpy[1], j.rpy[2], 'ZYX');
  originGroup.setRotationFromEuler(euler);

  parentGroup.add(originGroup);

  // Joint rotation group (this is what we animate)
  const jointGroup = new THREE.Group();
  // Joint rotates around its axis (always Z in URDF for revolute)
  jointGroups.push(jointGroup);
  originGroup.add(jointGroup);

  parentGroup = jointGroup;
}

// ── Load STL meshes ─────────────────────────────────────────────
const stlLoader = new THREE.STLLoader();
let loadedCount = 0;

function loadSTL(index, parentGroup) {
  stlLoader.load('/meshes/' + STL_FILES[index], function(geometry) {
    const material = new THREE.MeshPhongMaterial({
      color: STL_COLORS[index],
      specular: 0x222233,
      shininess: 40,
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;
    parentGroup.add(mesh);
    linkMeshes.push(mesh);

    loadedCount++;
    if (loadedCount === STL_FILES.length) {
      setStatus('3D model loaded. Click "Read" to sync.');
    }
  });
}

// Link 0 mesh -> link0Group
loadSTL(0, link0Group);

// Link 1-6 meshes -> corresponding jointGroup
for (let i = 0; i < jointGroups.length; i++) {
  loadSTL(i + 1, jointGroups[i]);
}

// ── Gripper finger meshes (7-1.STL, 7-2.STL) ────────────────────
// Each finger moves 50mm over 90° of motor rotation.
// 7-1 and 7-2 are parented to J6 group (same as link 6 in URDF).
// Direction determined empirically: ±Y in link-6 local frame.
const GRIPPER_MAX_DISP = 0.050;  // 50mm per finger at 90°
const gripperMat = new THREE.MeshPhongMaterial({color: 0xdddddd, specular: 0x333344, shininess: 50});
let gripperFinger1 = null;
let gripperFinger2 = null;

stlLoader.load('/meshes/7-1.STL', function(geo) {
  gripperFinger1 = new THREE.Mesh(geo, gripperMat);
  jointGroups[5].add(gripperFinger1);  // child of J6 group
});
stlLoader.load('/meshes/7-2.STL', function(geo) {
  gripperFinger2 = new THREE.Mesh(geo, gripperMat);
  jointGroups[5].add(gripperFinger2);
});

// Base offset from URDF joint 7/8 origin relative to link 6
const GRIPPER_BASE_X = -0.0016279;
const GRIPPER_BASE_Y =  0.0;
const GRIPPER_BASE_Z =  0.064947;

function updateGripperMesh(angleDeg) {
  var d = (angleDeg / 90) * GRIPPER_MAX_DISP;
  if (gripperFinger1) gripperFinger1.position.set(GRIPPER_BASE_X + d,  GRIPPER_BASE_Y, GRIPPER_BASE_Z);
  if (gripperFinger2) gripperFinger2.position.set(GRIPPER_BASE_X - d,  GRIPPER_BASE_Y, GRIPPER_BASE_Z);
}

// ── Update 3D model from slider values ──────────────────────────
function updateRobotPreview() {
  for (let i = 0; i < JOINT_NAMES.length; i++) {
    if (i >= jointGroups.length) break;  // J7+ handled separately
    const deg = parseFloat(sliderData[JOINT_NAMES[i]].slider.value);
    const rad = deg * Math.PI / 180;
    jointGroups[i].rotation.z = rad;
  }
  // Update gripper fingers
  if (sliderData['7']) {
    updateGripperMesh(parseFloat(sliderData['7'].slider.value));
  }
}

// ── Build UI sliders ────────────────────────────────────────────
const sliderData = {};
const jointsDiv = document.getElementById('joints');

const enabledState = {};

JOINT_NAMES.forEach(function(name, i) {
  var smin = JOINT_SLIDER_LIMITS[name] ? JOINT_SLIDER_LIMITS[name][0] : -180;
  var smax = JOINT_SLIDER_LIMITS[name] ? JOINT_SLIDER_LIMITS[name][1] :  180;
  const row = document.createElement('div');
  row.className = 'joint-row';
  row.innerHTML =
    '<div class="joint-left">' +
      '<div class="joint-header">' +
        '<span class="joint-name">' + JOINT_LABELS[i] + '</span>' +
        '<span class="joint-values">' +
          '<span class="current" id="cur-' + name + '">0.0\u00b0</span> \u2192 ' +
          '<span class="target" id="tgt-' + name + '">0.0\u00b0</span>' +
        '</span>' +
      '</div>' +
      '<input type="range" id="slider-' + name + '" min="' + smin + '" max="' + smax + '" step="0.5" value="0">' +
      '<div class="torque-row">' +
        '<div class="torque-bar-wrap"><div class="torque-bar-fill" id="tbar-' + name + '"></div></div>' +
        '<span class="torque-info" id="tinfo-' + name + '">τ — Nm | err —°</span>' +
      '</div>' +
    '</div>' +
    '<div class="joint-right">' +
      '<div class="joint-btns">' +
        '<button class="btn-zero" onclick="setZero(\'' + name + '\')">置为零位</button>' +
        '<button class="btn-en off" id="en-' + name + '" onclick="toggleEnable(\'' + name + '\')">使能</button>' +
      '</div>' +
      '<input type="number" class="angle-input" id="num-' + name + '" min="' + smin + '" max="' + smax + '" step="0.5" value="0">' +
    '</div>';
  jointsDiv.appendChild(row);

  const slider = document.getElementById('slider-' + name);
  sliderData[name] = { slider: slider, current: 0 };
  enabledState[name] = false;

  var numInput = document.getElementById('num-' + name);

  slider.addEventListener('input', function() {
    var deg = parseFloat(slider.value);
    numInput.value = deg.toFixed(1);
    document.getElementById('tgt-' + name).textContent = deg.toFixed(1) + '\u00b0';
    updateRobotPreview();
  });

  function applyNumInput() {
    var deg = parseFloat(numInput.value);
    if (isNaN(deg)) return;
    deg = Math.max(smin, Math.min(smax, deg));
    numInput.value = deg.toFixed(1);
    slider.value = deg;
    document.getElementById('tgt-' + name).textContent = deg.toFixed(1) + '\u00b0';
    updateRobotPreview();
  }
  numInput.addEventListener('change', applyNumInput);
  numInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') applyNumInput(); });
});

function setEnableBtn(name, on) {
  enabledState[name] = on;
  var btn = document.getElementById('en-' + name);
  btn.className = 'btn-en ' + (on ? 'on' : 'off');
  btn.textContent = on ? '已使能' : '使能';
}

function toggleEnable(name) {
  var on = enabledState[name];
  var url = on ? '/api/disable_motor' : '/api/enable_motor';
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: parseInt(name) }),
  }).then(function(r) { return r.json(); })
    .then(function(d) { setEnableBtn(name, d.enabled); })
    .catch(function(e) { setStatus('使能切换失败: ' + e.message); });
}

  var label = 'J' + name;
  if (!confirm('确认将 ' + label + ' 当前位置写为零点？\n此操作写入电机 flash，不可撤销。')) return;

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: parseInt(name) }),
  }).then(function(r) { return r.json(); })
    .then(function() {
      setStatus(label + ' 零位已写入');
      log(label + ' 零位写入完成', 'warn');
      // 归零显示
      sliderData[name].slider.value = 0;

      document.getElementById('cur-' + name).textContent = '0.0°';
      document.getElementById('tgt-' + name).textContent = '0.0°';

// ── Log ─────────────────────────────────────────────────────────
function log(msg, type) {
  type = type || 'info';
  var box = document.getElementById('log-box');
  var now = new Date();
  var ts = now.toTimeString().slice(0,8);
  var line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.innerHTML = '<span class="ts">' + ts + '</span><span class="msg">' + msg + '</span>';
  box.insertBefore(line, box.firstChild);
  // 最多保留 80 条
  while (box.children.length > 80) box.removeChild(box.lastChild);
}

// ── API functions ───────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setProgress(pct) { document.getElementById('progress-fill').style.width = pct + '%'; }

function readCurrent() {
  setStatus('Reading...');
  fetch('/api/read', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var parts = [];
      JOINT_NAMES.forEach(function(name) {
        var rad = data[name] || 0;
        var deg = rad * 180 / Math.PI;
        sliderData[name].slider.value = deg.toFixed(1);
        sliderData[name].current = deg;
        document.getElementById('cur-' + name).textContent = deg.toFixed(1) + '\u00b0';
        document.getElementById('tgt-' + name).textContent = deg.toFixed(1) + '\u00b0';
        document.getElementById('num-' + name).value = deg.toFixed(1);
        parts.push('J' + name + ':' + deg.toFixed(1) + '\u00b0');
      });
      updateRobotPreview();
      setStatus('Synced to current positions');
      log('读取位置 \u2192 ' + parts.join('  '), 'info');
    })
    .catch(function(e) { setStatus('Read error: ' + e.message); log('读取失败: ' + e.message, 'err'); });
}

function executeMove() {
  var btn = document.getElementById('btn-exec');
  btn.disabled = true;
  setProgress(0);

  var targets = {};
  var movingJoints = [];
  JOINT_NAMES.forEach(function(name) {
    var deg = parseFloat(sliderData[name].slider.value);
    targets[name] = deg * Math.PI / 180;
    var diff = Math.abs(deg - sliderData[name].current);
    if (diff > 0.5) movingJoints.push('J' + name + '(' + (deg >= 0 ? '+' : '') + deg.toFixed(1) + '\u00b0)');
  });

  if (movingJoints.length === 0) {
    log('目标与当前位置相同，无需运动', 'warn');
    setStatus('No movement needed.');
    btn.disabled = false;
    return;
  }
  log('开始运动 \u2192 ' + movingJoints.join('  '), 'move');
  setStatus('Moving...');
  fetch('/api/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(targets),
  }).then(function() {
    var duration = 2500;
    var start = Date.now();
    var poll = setInterval(function() {
      var elapsed = Date.now() - start;
      setProgress(Math.min(100, elapsed / duration * 100));

      fetch('/api/read', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          JOINT_NAMES.forEach(function(name) {
            var rad = data[name] || 0;
            var deg = rad * 180 / Math.PI;
            sliderData[name].current = deg;
            document.getElementById('cur-' + name).textContent = deg.toFixed(1) + '\u00b0';
            sliderData[name].slider.value = deg.toFixed(1);
            document.getElementById('num-' + name).value = deg.toFixed(1);
            document.getElementById('tgt-' + name).textContent = deg.toFixed(1) + '\u00b0';
            updateRobotPreview();
          });
        }).catch(function(){});

      if (elapsed >= duration) {
        clearInterval(poll);
        setProgress(100);
        setStatus('Move complete!');
        log('运动完成 \u2714', 'ok');
        btn.disabled = false;
      }
    }, 250);
  }).catch(function(e) {
    setStatus('Error: ' + e.message);
    btn.disabled = false;
  });
}

function emergencyStop() {
  fetch('/api/stop', { method: 'POST' })

      document.getElementById('btn-exec').disabled = false;

    .catch(function(e) { setStatus('Stop error: ' + e.message); log('停止失败: ' + e.message, 'err'); });
}

function ikPreview() {
  var x = parseFloat(document.getElementById('ik-x').value);
  var y = parseFloat(document.getElementById('ik-y').value);
  var z = parseFloat(document.getElementById('ik-z').value);
  document.getElementById('ik-result').style.display = 'none';
  document.getElementById('ik-error').style.display  = 'none';
  setStatus('IK求解中...');
  fetch('/api/ik_preview', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ x: x, y: y, z: z, orientation: _ikOrient }),
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        var a = d.actual_xyz;
        document.getElementById('ik-res-xyz').textContent =
          'X ' + a.x + '  Y ' + a.y + '  Z ' + a.z + ' mm';
        document.getElementById('ik-res-err').textContent = d.pos_error_mm + ' mm';
        var j = d.joint_angles_deg;
        document.getElementById('ik-res-joints').textContent =
          [1,2,3,4,5,6].map(function(i){ return j[i]; }).join('  ');
        // 更新3D模型为IK预览姿态
        for (var i = 0; i < 6; i++) {
          jointGroups[i].rotation.z = j[String(i+1)] * Math.PI / 180;
        }
        document.getElementById('ik-result').style.display = 'block';
        setStatus('IK求解成功，确认姿态后点执行');
      } else {
        var el = document.getElementById('ik-error');
        el.textContent = d.error;
        el.style.display = 'block';
        setStatus('IK无解');
      }
    })
    .catch(function(e) { setStatus('预览失败: ' + e); });
}

// ── 实时力矩 + 位置误差显示 ─────────────────────────────────────
// 各关节额定力矩上限（用于彩色进度条满量程）
const TAU_MAX = { '1': 20, '2': 20, '3': 12, '4': 5, '5': 5, '6': 5, '7': 3 };

function updateTorqueDisplay(data) {
  JOINT_NAMES.forEach(function(name) {
    var entry = data[name];
    if (!entry) return;
    var tau = entry.tau;           // Nm，可为负
    var qRad = entry.q;
    var curDeg = qRad * 180 / Math.PI;

    // 位置误差 = 目标 - 实际
    var tgtDeg = parseFloat(document.getElementById('tgt-' + name).textContent);
    var errDeg = tgtDeg - curDeg;

    // 彩色进度条
    var maxTau = TAU_MAX[name] || 10;
    var pct = Math.min(100, Math.abs(tau) / maxTau * 100);
    var color = pct < 40 ? '#06d6a0' : pct < 75 ? '#ffd166' : '#ef476f';
    var fill = document.getElementById('tbar-' + name);
    if (fill) { fill.style.width = pct.toFixed(1) + '%'; fill.style.background = color; }

    // 文字：τ 值 + 误差
    var errSign = errDeg >= 0 ? '+' : '';
    var info = document.getElementById('tinfo-' + name);
    if (info) {
      info.textContent = '\u03c4 ' + tau.toFixed(2) + 'Nm | err ' + errSign + errDeg.toFixed(1) + '\u00b0';
      info.style.color = Math.abs(errDeg) > 2 ? '#ffd166' : '#aaa';
    }

    // 示教/回放模式：实时同步实际关节角到3D模型和当前角度显示
    if (_teachActive || _playActive) {
      var idx = parseInt(name) - 1;
      if (idx >= 0 && idx < jointGroups.length) {
        jointGroups[idx].rotation.z = qRad;
      }
      if (name === '7') updateGripperMesh(curDeg);
      var curEl = document.getElementById('cur-' + name);
      if (curEl) curEl.textContent = curDeg.toFixed(1) + '\u00b0';
    }
  });
}

}

function gripperMoveTo(deg) {

    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({angle_deg: deg}) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        log('夹爪 → ' + d.angle_deg + '°', 'move');
        // sync slider display
        if (sliderData['7']) {
          sliderData['7'].slider.value = d.angle_deg;
          document.getElementById('tgt-7').textContent = d.angle_deg + '\u00b0';
          document.getElementById('num-7').value = d.angle_deg;
        }
      } else setStatus('夹爪控制失败: ' + (d.error || ''));
    });
}

setInterval(pollStatus, 200);  // 5 Hz

// ── 拖动示教 ────────────────────────────────────────────────────
var _teachTimer = null;
var _teachSec = 0;
var _teachActive = false;
var teachings_cache = [];  // store current names for Escape revert

function refreshTeachList() {
  fetch('/api/teach/list', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(list) {
      var box = document.getElementById('teach-list');
      box.innerHTML = '';
      teachings_cache = list.map(function(t) { return t.name; });
      list.forEach(function(t, i) {
        var row = document.createElement('div');
        row.className = 'teach-card';
        row.innerHTML =
          '<input class="teach-name-input" value="' + t.name + '" title="回车保存名称">' +
          '<span class="teach-meta">' + t.count + '帧 / ' + t.duration + 's</span>' +
          '<button class="btn-teach-play" onclick="teachPlay(' + i + ')">动作回放</button>' +
          '<button class="btn-teach-del" onclick="teachDelete(' + i + ')">删除</button>';
        var input = row.querySelector('.teach-name-input');
        (function(capturedIdx) {
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
            if (e.key === 'Escape') { this.value = teachings_cache[capturedIdx] || this.value; this.blur(); }
          });
          input.addEventListener('blur', function() { teachRename(capturedIdx, this.value.trim()); });
        })(i);
        box.appendChild(row);
      });
    })
    .catch(function() {});
}

function teachStart() {
  fetch('/api/teach/start', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) { log('示教启动失败', 'err'); return; }
      document.getElementById('btn-teach-start').disabled = true;
      document.getElementById('btn-teach-stop').disabled = false;
      _teachActive = true;
      _teachSec = 0;
      document.getElementById('teach-rec-status').textContent = '● 录制中 0.0s';
      _teachTimer = setInterval(function() {
        _teachSec += 0.1;
        document.getElementById('teach-rec-status').textContent =
          '● 录制中 ' + _teachSec.toFixed(1) + 's';
      }, 100);
      log('示教录制开始', 'ok');
    })
    .catch(function(e) { log('示教启动失败: ' + e.message, 'err'); });
}

function teachStop() {
  clearInterval(_teachTimer);
  _teachActive = false;
  document.getElementById('teach-rec-status').textContent = '处理中...';
  fetch('/api/teach/stop', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('btn-teach-start').disabled = false;
      document.getElementById('btn-teach-stop').disabled = true;
      if (d.ok) {
        document.getElementById('teach-rec-status').textContent =
          '已保存: ' + d.name + ' (' + d.count + '帧 / ' + d.duration + 's)';
        log('示教已保存: ' + d.name + ' ' + d.count + '帧 / ' + d.duration + 's', 'ok');
        refreshTeachList();
      } else {
        document.getElementById('teach-rec-status').textContent = '保存失败: ' + d.error;
        log('示教保存失败: ' + d.error, 'err');
      }
    })
    .catch(function(e) { log('结束示教失败: ' + e.message, 'err'); });
}

var _playPollTimer = null;
var _playActive = false;

function startPlayProgressPoll() {
  var prog = document.getElementById('teach-play-progress');
  prog.style.display = 'block';
  _playPollTimer = setInterval(function() {
    fetch('/api/teach/play_status', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(s) {
        var label = document.getElementById('teach-play-label');
        var fill  = document.getElementById('teach-play-fill');
        if (s.phase === 'moving') {
          label.innerHTML = '移动至起始位置... <span>' + s.name + '</span>';
          fill.style.width = '15%';
          fill.style.background = '#ffd166';
        } else if (s.phase === 'playing') {
          label.innerHTML = '回放中 <span>' + s.name + '</span>  ' + s.progress + '%';
          fill.style.width = (15 + s.progress * 0.85) + '%';
          fill.style.background = 'linear-gradient(90deg,#3a86ff,#06d6a0)';
        } else {
          label.innerHTML = '回放完成 <span>' + s.name + '</span>';
          fill.style.width = '100%';
          _playActive = false;
          clearInterval(_playPollTimer);
          setTimeout(function() {
            prog.style.display = 'none';
          }, 2000);
        }
      })
      .catch(function() {});
  }, 300);
}

function teachPlay(idx) {
  fetch('/api/teach/play', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        log('回放示教动作 #' + (idx + 1), 'move');
        _playActive = true;
        startPlayProgressPoll();
      } else {
        log('回放失败: ' + d.error, 'err');
      }
    })
    .catch(function(e) { log('回放失败: ' + e.message, 'err'); });
}

function teachRename(idx, newName) {
  if (!newName || newName === teachings_cache[idx]) return;
  fetch('/api/teach/rename', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx, name: newName })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) { teachings_cache[idx] = newName; log('已重命名为: ' + newName, 'info'); }
    })
    .catch(function() {});
}

function teachDelete(idx) {
  fetch('/api/teach/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: idx })
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) { log('已删除示教动作 #' + (idx + 1), 'info'); refreshTeachList(); }
    })
    .catch(function() {});
}

refreshTeachList();

// ── Render loop ─────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Pick & Place Sequence ─────────────────────────────────────────

function seqRecordPick() {
  fetch('/api/ee_pose', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('seq-pick-x').value = d.x;
      document.getElementById('seq-pick-y').value = d.y;
      document.getElementById('seq-pick-z').value = d.z;
      log('已记录抓取位: X=' + d.x + ' Y=' + d.y + ' Z=' + d.z + ' mm', 'ok');
    });
}

function seqRecordPlace() {
  fetch('/api/ee_pose', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById('seq-place-x').value = d.x;
      document.getElementById('seq-place-y').value = d.y;
      document.getElementById('seq-place-z').value = d.z;
      log('已记录放置位: X=' + d.x + ' Y=' + d.y + ' Z=' + d.z + ' mm', 'ok');
    });
}

var _seqPreviewOk = false;
var _seqPreviewData = null;

function seqPreview() {
  var px = parseFloat(document.getElementById('seq-pick-x').value);
  var py = parseFloat(document.getElementById('seq-pick-y').value);
  var pz = parseFloat(document.getElementById('seq-pick-z').value);
  var lx = parseFloat(document.getElementById('seq-place-x').value);
  var ly = parseFloat(document.getElementById('seq-place-y').value);
  var lz = parseFloat(document.getElementById('seq-place-z').value);
  var dist = parseFloat(document.getElementById('seq-approach-dist').value) || 100;
  var pickOrient  = document.getElementById('seq-pick-orient').value;
  var placeOrient = document.getElementById('seq-place-orient').value;

  if (isNaN(px)||isNaN(py)||isNaN(pz)||isNaN(lx)||isNaN(ly)||isNaN(lz)) {
    document.getElementById('seq-preview-result').innerHTML =
      '<span class="seq-preview-err">请先填写抓取位和放置位坐标</span>';
    return;
  }

  document.getElementById('seq-preview-result').innerHTML = '求解中…';
  document.getElementById('btn-seq-run').disabled = true;
  _seqPreviewOk = false;

  fetch('/api/sequence/preview', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      pick_x: px, pick_y: py, pick_z: pz, pick_orient: pickOrient,
      place_x: lx, place_y: ly, place_z: lz, place_orient: placeOrient,
      approach_dist: dist
    })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      _seqPreviewData = d;
      var labels = {
        pick_approach: '①抓取接近位',
        pick:          '②抓取位',
        place_approach:'③放置接近位',
        place:         '④放置位'
      };
      var html = '';
      var allOk = true;
      Object.keys(labels).forEach(function(key) {
        var r = d.positions[key];
        if (r && r.ok) {
          html += '<span class="seq-preview-ok">✓ ' + labels[key] + ' (误差' + r.pos_error_mm + 'mm)</span><br>';
        } else {
          html += '<span class="seq-preview-err">✗ ' + labels[key] + ': ' + (r ? r.error : '未知错误') + '</span><br>';
          allOk = false;
        }
      });
      document.getElementById('seq-preview-result').innerHTML = html;
      _seqPreviewOk = allOk;
      document.getElementById('btn-seq-run').disabled = !allOk;
      if (allOk) log('序列路径预览通过 ✓ 可执行', 'ok');
      else log('序列路径预览失败，请调整坐标', 'err');
    });
}

function seqRun() {
  if (!_seqPreviewOk || !_seqPreviewData) { return; }
  var px = parseFloat(document.getElementById('seq-pick-x').value);
  var py = parseFloat(document.getElementById('seq-pick-y').value);
  var pz = parseFloat(document.getElementById('seq-pick-z').value);
  var lx = parseFloat(document.getElementById('seq-place-x').value);
  var ly = parseFloat(document.getElementById('seq-place-y').value);
  var lz = parseFloat(document.getElementById('seq-place-z').value);
  var dist = parseFloat(document.getElementById('seq-approach-dist').value) || 100;
  var pickOrient  = document.getElementById('seq-pick-orient').value;
  var placeOrient = document.getElementById('seq-place-orient').value;

  document.getElementById('btn-seq-run').disabled = true;
  document.getElementById('seq-progress-wrap').style.display = 'block';
  document.getElementById('seq-status-text').className = 'seq-status-text';
  document.getElementById('seq-status-text').textContent = '启动中…';
  _playActive = true;

  fetch('/api/sequence/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      pick_x: px, pick_y: py, pick_z: pz, pick_orient: pickOrient,
      place_x: lx, place_y: ly, place_z: lz, place_orient: placeOrient,
      approach_dist: dist
    })
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        log('抓取放置序列启动', 'move');
        _seqPolling = setInterval(seqPollStatus, 300);
      } else {
        log('序列启动失败: ' + d.error, 'err');
        document.getElementById('btn-seq-run').disabled = false;
        _playActive = false;
      }
    });
}

var _seqPolling = null;

function seqPollStatus() {
  fetch('/api/sequence/status', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(s) {
      var pct = s.total_steps > 0 ? (s.step / s.total_steps * 100) : 0;
      document.getElementById('seq-step-fill').style.width = pct + '%';
      var el = document.getElementById('seq-status-text');

      if (s.error) {
        el.className = 'seq-status-text err';
        el.textContent = 'Step ' + s.step + '/8 — ' + s.error;
        log('序列错误: ' + s.error, 'err');
        _stopSeqPolling();
      } else if (!s.active && s.step === 8) {
        el.className = 'seq-status-text ok';
        el.textContent = '✓ 完成';
        log('抓取放置序列完成 ✓', 'ok');
        _stopSeqPolling();
      } else if (s.active) {
        el.className = 'seq-status-text';
        el.textContent = 'Step ' + s.step + '/8 — ' + s.step_name;
      }
    });
}

function _stopSeqPolling() {
  if (_seqPolling) { clearInterval(_seqPolling); _seqPolling = null; }
  _playActive = false;
  document.getElementById('btn-seq-run').disabled = !_seqPreviewOk;
}

function seqStop() {
  fetch('/api/sequence/stop', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function() {
      log('序列已中止', 'warn');
      _stopSeqPolling();
      var el = document.getElementById('seq-status-text');
      el.className = 'seq-status-text err';
      el.textContent = '已中止';
    });
}
</script>
